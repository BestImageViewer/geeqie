# SPDX-License-Identifier: GPL-2.0-or-later

name: geeqie
title: Geeqie
base: core26
adopt-info: geeqie

summary: Lightweight, fast GTK image viewer
description: |
  Geeqie is a fast GTK image viewer for browsing large image collections.

# lzo compression results in a larger file size but much faster
# cold-start time
compression: lzo
grade: devel
confinement: strict

apps:
  geeqie:  # auto-detect (Wayland if available, else X11)
    command-chain:
      - bin/fix-platform-order.sh
      - bin/env-gtk.sh
      - bin/auto-backend.sh
      - bin/env-imagemagick.sh
      - bin/set-xdg-vars.sh
    command: usr/bin/geeqie
    environment:
      GIO_USE_NETWORK_MONITOR: base
      GIO_USE_PROXY_RESOLVER: dummy
      MAGICK_HOME: "$SNAP/usr"
      PATH: "$SNAP/usr/bin:$SNAP/bin:$PATH"
    plugs:
      - home
      - removable-media
      - gsettings
      - wayland
      - x11
      - opengl
      - network
      - desktop
      - desktop-legacy

  wayland:
    command-chain:
      - bin/fix-platform-order.sh
      - bin/env-gtk.sh
      - bin/force-wayland.sh
      - bin/env-imagemagick.sh
    command: usr/bin/geeqie
    environment:
      GIO_USE_NETWORK_MONITOR: base
      GIO_USE_PROXY_RESOLVER: dummy
      MAGICK_HOME: "$SNAP/usr"
      PATH: "$SNAP/usr/bin:$SNAP/bin:$PATH"
    plugs:
      - home
      - removable-media
      - gsettings
      - wayland
      - x11
      - opengl
      - network
      - desktop
      - desktop-legacy

  x11:
    command-chain:
      - bin/fix-platform-order.sh
      - bin/env-gtk.sh
      - bin/force-x11.sh
      - bin/env-imagemagick.sh
    command: usr/bin/geeqie
    environment:
      GIO_USE_NETWORK_MONITOR: base
      GIO_USE_PROXY_RESOLVER: dummy
      MAGICK_HOME: "$SNAP/usr"
      PATH: "$SNAP/usr/bin:$SNAP/bin:$PATH"
    plugs:
      - home
      - removable-media
      - gsettings
      - wayland
      - x11
      - opengl
      - network
      - desktop
      - desktop-legacy

slots:
  geeqie-dbus:
    interface: dbus
    bus: session
    name: org.geeqie.Geeqie

parts:
  geeqie:
    plugin: meson
    source: .
    meson-parameters:
      - --prefix=/usr
      - --wrap-mode=default
      - -Ddoxygen=disabled
      - -Dgit=disabled
      - -Dhelp_pdf=disabled
      - -Dpandoc=disabled
      - -Dunit_tests=disabled
      - -Dyelp-build=disabled
    parse-info:
      - usr/share/metainfo/org.geeqie.Geeqie.metainfo.xml
    build-environment:
      - LDFLAGS: -Wl,--as-needed -lzstd
      - MESON_PACKAGE_CACHE_DIR: $CRAFT_PART_BUILD/meson-packagecache
    build-packages:
      - appstream
      - build-essential
      - curl
      - gettext
      - libarchive-dev
      - libcfitsio-dev
      - libcogl-dev
      - libdjvulibre-dev
      - libdw-dev
      - libffmpegthumbnailer-dev
      - libfftw3-dev
      - libgexiv2-dev
      - libglib2.0-dev
      - libspelling-1-dev
      - libgtk-4-dev
      - libheif-dev
      - libimath-dev
      - libjpeg-turbo8-dev
      - libjxl-dev
      - liblcms2-dev
      - liblua5.3-dev
      - libomp-dev
      - libopenexr-dev
      - libpango1.0-dev
      - libpng-dev
      - libpoppler-glib-dev
      - libraw-dev
      - libshumate-dev
      - libtiff-dev
      - libunwind-dev
      - libwebp-dev
      - libzstd-dev
      - meson
      - ninja-build
      - pkg-config
    stage-packages:
      - adwaita-icon-theme
      - ca-certificates
      - fonts-cantarell
      - glycin-loaders
      - glib-networking
      - gsettings-desktop-schemas
      - hicolor-icon-theme
      - iso-codes
      - libsoup-3.0-0
      - libproxy1v5

      - libarchive13t64
      - libcfitsio10t64
      - libcogl20
      - libdjvulibre21
      - libexif12
      - libexiv2-28
      - libffmpegthumbnailer4v5
      - libfftw3-double3
      - libgdk-pixbuf2.0-bin
      - libgexiv2-2
      - libgfortran5
      - libglycin-gtk4-2-0
      - libegl1
      - libgl1
      - libgl1-mesa-dri
      - libgles2
      - libglx-mesa0
      - libgtk-4-1
      - libgtk-4-bin
      - libgtk-4-common
      - libspelling-1-2
      - libheif1
      - libimath-3-1-29t64
      - libjpeg-turbo8
      - libjxl0.11
      - liblcms2-2
      - liblua5.3-0
      - libopenexr-3-1-30
      - libpng16-16t64
      - libpoppler-glib8t64
      - libraw23t64
      - librsvg2-common
      - libshumate-1.0-1
      - libtiff6
      - libvulkan1
      - libwebp7
      - mesa-vulkan-drivers
      - shared-mime-info

      # ImageMagick (tools + configs) for scripts
      - imagemagick-7.q16
      - imagemagick-7-common

      # LAPACK/BLAS (needed by your env chain)
      - libblas3
      - liblapack3

      # Helpers
      - bc
      - libimage-exiftool-perl
      - exiftran
      - exiv2
      - gphoto2
      - zenity
      - yad

    override-prime: |
      set -eux
      craftctl default

      # stamp version even if adopt-info is set
      ver="$(git describe --tags --dirty --always 2>/dev/null || date +'%Y%m%d').edge"
      craftctl set version="$ver"

      # Compat symlinks for IM7 tools
      for tool in convert mogrify identify composite compare; do
        if [ -x "$CRAFT_PRIME/usr/bin/${tool}-im7.q16" ] && [ ! -e "$CRAFT_PRIME/usr/bin/$tool" ]; then
          ln -s "${tool}-im7.q16" "$CRAFT_PRIME/usr/bin/$tool"
        fi
      done

      # Ensure delegates.xml uses in-snap libs
      f="$CRAFT_PRIME/etc/ImageMagick-7/delegates.xml"
      [ -f "$f" ] && sed -i 's|/usr/lib/|${SNAP}/usr/lib/|g' "$f"

      ca_cert_dir="$CRAFT_PRIME/etc/ssl/certs"
      ca_source_dir="$CRAFT_PRIME/usr/share/ca-certificates/mozilla"
      if [ -d "$ca_source_dir" ]; then
        mkdir -p "$ca_cert_dir"
        cat "$ca_source_dir"/*.crt > "$ca_cert_dir/ca-certificates.crt"
      fi

      schema_dir="$CRAFT_PRIME/usr/share/glib-2.0/schemas"
      if [ -d "$schema_dir" ]; then
        glib-compile-schemas "$schema_dir"
      fi

      glycin_conf_dir="$CRAFT_PRIME/usr/share/glycin-loaders"
      if [ -d "$glycin_conf_dir" ]; then
        find "$glycin_conf_dir" -type f -name '*.conf' -exec \
          sed -i 's|Exec=/usr/libexec/|Exec=/snap/geeqie/current/usr/libexec/|g' {} +
      fi

      # Make BLAS/LAPACK visible at /usr/lib/$arch by creating symlinks
      arch_dir="$CRAFT_PRIME/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)"

      # Link everything in these subdirs into the arch dir
      for sub in blas lapack; do
        d="$arch_dir/$sub"
        [ -d "$d" ] || continue
        for f in "$d"/lib*.so*; do
          [ -e "$f" ] || continue
          base="$(basename "$f")"
          dest="$arch_dir/$base"
          # Remove any existing file/symlink at the destination, then link
          rm -f "$dest"
          ln -s "$sub/$base" "$dest"
        done
      done

  launcher:
    plugin: nil
    source: .
    build-packages:
      - gcc
      - libgdk-pixbuf-2.0-dev
      - libpng-dev
      - pkg-config
    override-build: |
      arch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
      mkdir -p "$CRAFT_PART_INSTALL/usr/lib/$arch/geeqie"
      cc -shared -fPIC snap/local/gdk-pixbuf-png-shim.c \
        -o "$CRAFT_PART_INSTALL/usr/lib/$arch/geeqie/libgdk-pixbuf-png-shim.so" \
        $(pkg-config --cflags --libs gdk-pixbuf-2.0 libpng) -ldl

      install -Dm755 snap/local/fix-platform-order.sh "$CRAFT_PART_INSTALL/bin/fix-platform-order.sh"
      install -Dm755 snap/local/env-gtk.sh "$CRAFT_PART_INSTALL/bin/env-gtk.sh"
      install -Dm755 snap/local/ensure-gdkpixbuf-cache.sh "$CRAFT_PART_INSTALL/bin/ensure-gdkpixbuf-cache.sh"
      install -Dm755 snap/local/env-imagemagick.sh "$CRAFT_PART_INSTALL/bin/env-imagemagick.sh"
      install -Dm755 snap/local/auto-backend.sh    "$CRAFT_PART_INSTALL/bin/auto-backend.sh"
      install -Dm755 snap/local/force-wayland.sh   "$CRAFT_PART_INSTALL/bin/force-wayland.sh"
      install -Dm755 snap/local/force-x11.sh       "$CRAFT_PART_INSTALL/bin/force-x11.sh"
      install -Dm755 snap/local/set-xdg-vars.sh "$CRAFT_PART_INSTALL/bin/set-xdg-vars.sh"
